version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drogon_jwt_postgres_s3
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - ieee_network
  s3:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    environment:
      - MINIO_ROOT_USER=suryansh
      - MINIO_ROOT_PASSWORD=suryansh
    ports:
      # Map the API port (for S3 clients)
      - "9000:9000"
      # Map the Console port (for the web UI)
      - "9001:9001"
    volumes:
      - ./minio_data:/data
    # The command to start the MinIO server and enable the console
    command: server /data --console-address ":9001"
    networks:
      - ieee_network

networks:
  ieee_network:
    driver: bridge